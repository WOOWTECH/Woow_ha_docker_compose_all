version: "3.8"

services:
  # ============================================================
  # PostgreSQL — Recorder database for Home Assistant
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: ha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-homeassistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeassistant} -d ${POSTGRES_DB:-homeassistant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ha_network

  # ============================================================
  # Home Assistant — Core smart-home platform
  # ============================================================
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:${HA_VERSION:-stable}
    container_name: homeassistant
    restart: unless-stopped
    privileged: true
    environment:
      TZ: ${TZ:-Asia/Taipei}
    volumes:
      - ./config:/config
    ports:
      - "${HA_PORT:-8123}:8123"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ha_network

volumes:
  postgres_data:
    driver: local

networks:
  ha_network:
    driver: bridge
